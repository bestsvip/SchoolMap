    <style>
      :root {
        --primary-color: #ff6b6b;
        --bg-color: #f7f9fc;
        --card-bg: #ffffff;
      }

      .check-in-card {
        position: relative;
        width: 320px;
        height: 400px;
        top: 40px;
        background: var(--card-bg);
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .map-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.05;
        background-image: radial-gradient(#666 1px, transparent 1px);
        background-size: 20px 20px;
        z-index: 0;
      }

      .action-area {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .locate-btn {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: none;
        background: white;
        box-shadow: 0 10px 25px rgba(52, 152, 219, 0.3);
        cursor: pointer;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: all 0.3s ease;
        outline: none;
      }

      .locate-btn svg {
        width: 40px;
        height: 40px;
        fill: #3498db;
        transition: fill 0.3s;
      }

      .ripple {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 2px solid #3498db;
        opacity: 0;
        pointer-events: none;
      }

      .locate-btn.active .ripple {
        animation: ripple-effect 1.5s infinite;
      }

      .locate-btn.active .ripple:nth-child(2) {
        animation-delay: 0.5s;
      }

      @keyframes ripple-effect {
        0% {
          width: 100%;
          height: 100%;
          opacity: 0.8;
          border-width: 2px;
        }
        100% {
          width: 250%;
          height: 250%;
          opacity: 0;
          border-width: 0px;
        }
      }

      .btn-text {
        margin-top: 20px;
        color: #555;
        font-weight: 600;
        font-size: 16px;
        letter-spacing: 1px;
        transition: opacity 0.3s;
      }

      .stamp-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(3) rotate(-20deg);
        opacity: 0;
        pointer-events: none;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .stamp-container.show {
        animation: stamp-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)
          forwards;
      }

      @keyframes stamp-in {
        0% {
          transform: translate(-50%, -50%) scale(3) rotate(-20deg);
          opacity: 0;
        }
        60% {
          transform: translate(-50%, -50%) scale(0.9) rotate(5deg);
          opacity: 1;
        }
        80% {
          transform: translate(-50%, -50%) scale(1.1) rotate(-2deg);
        }
        100% {
          transform: translate(-50%, -50%) scale(1) rotate(0deg);
          opacity: 1;
        }
      }

      .stamp-circle {
        width: 140px;
        height: 140px;
        border: 6px solid var(--primary-color);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        background: rgba(255, 107, 107, 0.05);
        mask-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
        -webkit-mask-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
      }

      .stamp-text {
        color: var(--primary-color);
        font-weight: 900;
        font-size: 24px;
        text-transform: uppercase;
        writing-mode: vertical-rl;
        letter-spacing: 5px;
        text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.5);
      }

      .stamp-date {
        position: absolute;
        bottom: 25px;
        font-size: 12px;
        color: var(--primary-color);
        font-weight: bold;
        writing-mode: horizontal-tb;
      }

      .success-info {
        position: absolute;
        bottom: 40px;
        text-align: center;
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.5s ease 0.3s;
        z-index: 15;
        width: 80%;
      }

      .check-in-card.success .success-info {
        opacity: 1;
        transform: translateY(0);
      }

      .location-name {
        font-size: 22px;
        font-weight: 800;
        color: #2c3e50;
        margin-bottom: 5px;
      }

      .location-sub {
        font-size: 14px;
        color: #7f8c8d;
      }

      .check-in-card.success .action-area {
        opacity: 0;
        pointer-events: none;
        transform: scale(0.8);
        transition: all 0.3s ease;
      }

      .confetti-piece {
        position: absolute;
        width: 10px;
        height: 10px;
        background: #ffd700;
        border-radius: 0;
        pointer-events: none;
        z-index: 30;
      }

      .reset-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        background: none;
        border: none;
        font-size: 12px;
        color: #999;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 50;
      }
      .check-in-card.success .reset-btn {
        opacity: 1;
      }
    </style>

    <script>
      /**
       * 通用 Meta 标签更新函数
       * @param {string} contentText - 要设置的描述文本
       * @param {boolean} createIfMissing - 如果标签不存在是否自动创建 (默认 true)
       */
      function updateMetaDescription(contentText, createIfMissing = true) {
        if (!contentText) return;

        const selector = 'meta[name="description"]';
        let metaTag = document.querySelector(selector);

        if (!metaTag) {
          if (createIfMissing) {
            metaTag = document.createElement("meta");
            metaTag.name = "description";
            metaTag.setAttribute("itemprop", "description");
            document.head.appendChild(metaTag);
          } else {
            console.warn("未找到 meta description 标签且未开启自动创建。");
            return;
          }
        }

        metaTag.setAttribute("content", contentText);
        return true;
      }

      // --- 初始运行调用 ---
      document.addEventListener("DOMContentLoaded", () => {
        const myDynamicText =
          "我已经逛了20多个地方，但是还没有找到一个适合自己的地方。";

        // 调用函数
        const success = updateMetaDescription(myDynamicText);

        if (success) {
          console.log("初始化完成：Meta Description 已更新。");
        }
      });
    </script>

    <script>

        if (hash) {

          const buildingIndex = Buildings.findIndex(
            (building) => building.id === hash,
          );
          if (buildingIndex !== -1 && Buildings[buildingIndex].status == 0) {

      checkInBtn.addEventListener("click", () => {

          return;
        checkInStartAnimation();
        checkInRemoveTimer = setTimeout(() => {
          checkInCard.remove();
        }, 6000);
      });

      function checkInStartAnimation() {
        checkInIsChecking = true;

        checkInBtn.classList.remove("active");
        checkInBtn.style.transform = "scale(0.9)";
        checkInBtn.querySelector("svg").style.fill = "#2ecc71";

            checkInCard.style.transform = "scale(1)";
          }, 200);
        }, 600);

      function checkInReset() {
        // 清除自动移除定时器
        if (checkInRemoveTimer) {
          clearTimeout(checkInRemoveTimer);
          checkInRemoveTimer = null;
        }

        checkInCard.classList.remove("success");
        checkInStamp.classList.remove("show");
        checkInBtn.style.transform = "scale(1)";

          .forEach((el) => el.remove());

        setTimeout(() => {
          checkInBtn.classList.add("active");

      function checkInPlaySound() {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;

          const ctx = new AudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();

          osc.connect(gain);
          gain.connect(ctx.destination);

          osc.type = "square";
          osc.frequency.setValueAtTime(150, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.1);

          gain.gain.setValueAtTime(0.1, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);

          osc.start();
          osc.stop(ctx.currentTime + 0.1);
        } catch (e) {
          console.log("Audio not supported or blocked");
        }
      }

          piece.classList.add("confetti-piece");

          const colors = ["#FFD700", "#FFA500", "#FF8C00", "#FFFACD"];
          piece.style.backgroundColor =
            colors[Math.floor(Math.random() * colors.length)];

          piece.style.transform = `rotate(${Math.random() * 360}deg)`;

          piece.style.left = centerX + (Math.random() - 0.5) * 100 + "px";
          piece.style.top = centerY + (Math.random() - 0.5) * 100 + "px";

          document.body.appendChild(piece);

          const angle = Math.random() * Math.PI * 2;
          const velocity = 10 + Math.random() * 15;
          const tx = Math.cos(angle) * velocity * 15;
          const ty = Math.sin(angle) * velocity * 15 + 100;

          const anim = piece.animate(
            [
              { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },
              {
                transform: `translate(${tx}px, ${ty}px) rotate(${Math.random() * 720}deg)`,
                opacity: 0,
              },
            ],
            {
              duration: 1000 + Math.random() * 1000,
              easing: "cubic-bezier(0.25, 0.46, 0.45, 0.94)",
              fill: "forwards",
            },
          );

          anim.onfinish = () => piece.remove();
        }
      }

    <script>
      // 战争迷雾类
      class WarFogMap {
        constructor(canvasId, options = {}) {
          this.canvas = document.getElementById(canvasId);
          this.ctx = this.canvas.getContext("2d");

          // 设置默认选项
          this.options = {
            userColor: options.userColor || "red",
            userStrokeColor: options.userStrokeColor || "white",
            fogColor: options.fogColor || "rgba(0, 0, 0, 0.8)",
            revealRadius: options.revealRadius || 30,
            ...options,
          };

          // 创建遮罩画布
          this.maskCanvas = document.createElement("canvas");
          this.maskCanvas.width = this.canvas.width;
          this.maskCanvas.height = this.canvas.height;
          this.maskCtx = this.maskCanvas.getContext("2d");

          // 用户位置
          this.userX = this.canvas.width / 2;
          this.userY = this.canvas.height / 2;

          // GPS边界坐标
          this.gpsBounds = {
            topLeft: { lng: 120.72584, lat: 30.749314 },
            topRight: { lng: 120.733207, lat: 30.749314 },
            bottomLeft: { lng: 120.72584, lat: 30.741963 },
            bottomRight: { lng: 120.733207, lat: 30.741963 },
          };

          // 缩放和平移相关属性
          this.scale = 1;
          this.translateX = 0;
          this.translateY = 0;
          this.isDragging = false;
          this.lastX = 0;
          this.lastY = 0;
          this.lastTouches = [];

          // 初始化
          this.init();

          // 加载背景图片
          this.backgroundImage = new Image();
          this.backgroundImage.src =
            "https://free.picui.cn/free/2026/03/16/69b6dfccd486a.jpg";
          this.backgroundImage.onload = () => {
            this.backgroundLoaded = true;
          };

          // 绑定触摸事件
          this.bindTouchEvents();
        }

        // 初始化迷雾
        init() {
          this.resetFog();
          // 尝试从localStorage恢复迷雾状态
          this.restoreFogState();
          this.updateDisplay();
        }

        // 重置迷雾为完全覆盖状态
        resetFog() {
          this.maskCtx.fillStyle = "black";
          this.maskCtx.fillRect(
            0,
            0,
            this.maskCanvas.width,
            this.maskCanvas.height,
          );
        }

        // 揭示指定区域（清除迷雾）
        revealArea(x, y, radius = this.options.revealRadius) {
          this.maskCtx.globalCompositeOperation = "destination-out";
          this.maskCtx.beginPath();
          this.maskCtx.arc(x, y, radius, 0, Math.PI * 2);
          this.maskCtx.fill();
          this.maskCtx.globalCompositeOperation = "source-over";
          // 保存迷雾状态到localStorage
          this.saveFogState();
        }

        // 设置用户位置
        setUserPosition(x, y) {
          this.userX = x;
          this.userY = y;
          this.revealArea(x, y);
        }

        // 绘制用户位置
        drawUserPosition() {
          this.ctx.beginPath();
          this.ctx.arc(this.userX, this.userY, 5, 0, Math.PI * 2);
          this.ctx.fillStyle = this.options.userColor;
          this.ctx.fill();
          this.ctx.strokeStyle = this.options.userStrokeColor;
          this.ctx.lineWidth = 1;
          this.ctx.stroke();
        }

        // 更新显示
        updateDisplay() {
          // 清除画布
          this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

          // 保存当前上下文状态
          this.ctx.save();

          // 应用缩放和平移变换
          this.ctx.translate(this.translateX, this.translateY);
          this.ctx.scale(this.scale, this.scale);

          // 绘制背景图片
          if (this.backgroundLoaded && this.backgroundImage) {
            // 使用drawImage的五参数版本，保持图片比例正确
            const imgAspect =
              this.backgroundImage.width / this.backgroundImage.height;
            const canvasAspect = this.canvas.width / this.canvas.height;

            let renderWidth,
              renderHeight,
              offsetX = 0,
              offsetY = 0;

            if (imgAspect > canvasAspect) {
              // 图片更宽，以高度为准
              renderHeight = this.canvas.height;
              renderWidth =
                this.backgroundImage.width *
                (renderHeight / this.backgroundImage.height);
              offsetX = (this.canvas.width - renderWidth) / 2;
            } else {
              // 图片更高，以宽度为准
              renderWidth = this.canvas.width;
              renderHeight =
                this.backgroundImage.height *
                (renderWidth / this.backgroundImage.width);
              offsetY = (this.canvas.height - renderHeight) / 2;
            }

            this.ctx.drawImage(
              this.backgroundImage,
              offsetX,
              offsetY,
              renderWidth,
              renderHeight,
            );
          } else {
            // 如果图片未加载完成，先用白色填充
            this.ctx.fillStyle = "#ffffff";
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
          }

          // 绘制迷雾遮罩
          this.ctx.drawImage(this.maskCanvas, 0, 0);

          // 绘制用户位置
          this.drawUserPosition();

          // 恢复上下文状态
          this.ctx.restore();
        }

        // 获取用户位置
        getUserPosition() {
          return { x: this.userX, y: this.userY };
        }

        // 将GPS坐标转换为画布坐标
        gpsToCanvas(gpsLat, gpsLng) {
          const bounds = this.gpsBounds;

          // 计算经度比例 (x轴)
          const lngRatio =
            (gpsLng - bounds.topLeft.lng) /
            (bounds.topRight.lng - bounds.topLeft.lng);

          // 计算纬度比例 (y轴) - 注意纬度是从上到下递减的
          const latRatio =
            (bounds.topLeft.lat - gpsLat) /
            (bounds.topLeft.lat - bounds.bottomLeft.lat);

          // 转换为画布坐标
          const x = lngRatio * this.canvas.width;
          const y = latRatio * this.canvas.height;

          return { x, y };
        }

        // 将画布坐标转换为GPS坐标
        canvasToGps(x, y) {
          const bounds = this.gpsBounds;

          // 计算画布上的比例
          const lngRatio = x / this.canvas.width;
          const latRatio = y / this.canvas.height;

          // 转换为GPS坐标
          const lng =
            bounds.topLeft.lng +
            lngRatio * (bounds.topRight.lng - bounds.topLeft.lng);
          const lat =
            bounds.topLeft.lat -
            latRatio * (bounds.topLeft.lat - bounds.bottomLeft.lat);

          return { lat, lng };
        }

        // 新增方法：保存迷雾状态到localStorage
        saveFogState() {
          try {
            const fogDataUrl = this.maskCanvas.toDataURL();
            localStorage.setItem("warFogState", fogDataUrl);
          } catch (e) {
            console.warn("无法保存迷雾状态到localStorage:", e);
          }
        }

        // 新增方法：从localStorage恢复迷雾状态
        restoreFogState() {
          try {
            const savedFogDataUrl = localStorage.getItem("warFogState");
            if (savedFogDataUrl) {
              const img = new Image();
              img.onload = () => {
                this.maskCtx.drawImage(img, 0, 0);
                this.updateDisplay();
              };
              img.src = savedFogDataUrl;
            }
          } catch (e) {
            console.warn("无法从localStorage恢复迷雾状态:", e);
          }
        }

        // 新增清除迷雾的方法
        clearFog() {
          // 使用正确比例绘制背景图片
          if (this.backgroundLoaded && this.backgroundImage) {
            const imgAspect =
              this.backgroundImage.width / this.backgroundImage.height;
            const canvasAspect = this.canvas.width / this.canvas.height;

            let renderWidth,
              renderHeight,
              offsetX = 0,
              offsetY = 0;

            if (imgAspect > canvasAspect) {
              renderHeight = this.canvas.height;
              renderWidth =
                this.backgroundImage.width *
                (renderHeight / this.backgroundImage.height);
              offsetX = (this.canvas.width - renderWidth) / 2;
            } else {
              renderWidth = this.canvas.width;
              renderHeight =
                this.backgroundImage.height *
                (renderWidth / this.backgroundImage.width);
              offsetY = (this.canvas.height - renderHeight) / 2;
            }

            this.ctx.drawImage(
              this.backgroundImage,
              offsetX,
              offsetY,
              renderWidth,
              renderHeight,
            );
          }
          // 清除所有迷雾并保存状态
          this.maskCtx.clearRect(
            0,
            0,
            this.maskCanvas.width,
            this.maskCanvas.height,
          );
          this.saveFogState();
        }

        // 新增方法：将用户位置居中显示
        centerOnUser() {
          // 计算需要的平移量，使得用户位置位于画布中心
          const centerX = this.canvas.width / 2;
          const centerY = this.canvas.height / 2;

          // 更新translate值使得userX, userY位于画布中心
          this.translateX = centerX - this.userX * this.scale;
          this.translateY = centerY - this.userY * this.scale;
          this.updateDisplay();
        }

        // 绑定触摸事件
        bindTouchEvents() {
          // 鼠标事件
          this.canvas.addEventListener("mousedown", (e) =>
            this.handleMouseDown(e),
          );
          this.canvas.addEventListener("mousemove", (e) =>
            this.handleMouseMove(e),
          );
          this.canvas.addEventListener("mouseup", (e) => this.handleMouseUp(e));
          this.canvas.addEventListener("mouseleave", (e) =>
            this.handleMouseUp(e),
          );

          // 触摸事件
          this.canvas.addEventListener("touchstart", (e) =>
            this.handleTouchStart(e),
          );
          this.canvas.addEventListener("touchmove", (e) =>
            this.handleTouchMove(e),
          );
          this.canvas.addEventListener("touchend", (e) =>
            this.handleTouchEnd(e),
          );
          this.canvas.addEventListener("touchcancel", (e) =>
            this.handleTouchEnd(e),
          );

          // 滚轮事件（用于缩放）
          this.canvas.addEventListener("wheel", (e) => this.handleWheel(e));
        }

        // 鼠标按下事件
        handleMouseDown(e) {
          this.isDragging = true;
          this.lastX = e.clientX;
          this.lastY = e.clientY;
          this.canvas.style.cursor = "grabbing";
        }

        // 鼠标移动事件
        handleMouseMove(e) {
          if (this.isDragging) {
            const deltaX = e.clientX - this.lastX;
            const deltaY = e.clientY - this.lastY;

            this.translateX += deltaX;
            this.translateY += deltaY;

            this.lastX = e.clientX;
            this.lastY = e.clientY;

            this.updateDisplay();
          }
        }

        // 鼠标释放事件
        handleMouseUp(e) {
          this.isDragging = false;
          this.canvas.style.cursor = "default";
        }

        // 触摸开始事件
        handleTouchStart(e) {
          e.preventDefault();
          this.lastTouches = Array.from(e.touches);

          if (e.touches.length === 1) {
            this.lastX = e.touches[0].clientX;
            this.lastY = e.touches[0].clientY;
          }
        }

        // 触摸移动事件
        handleTouchMove(e) {
          e.preventDefault();

          if (e.touches.length === 1) {
            // 单指拖动
            const deltaX = e.touches[0].clientX - this.lastX;
            const deltaY = e.touches[0].clientY - this.lastY;

            this.translateX += deltaX;
            this.translateY += deltaY;

            this.lastX = e.touches[0].clientX;
            this.lastY = e.touches[0].clientY;

            this.updateDisplay();
          } else if (e.touches.length === 2) {
            // 双指缩放
            const touch1 = e.touches[0];
            const touch2 = e.touches[1];

            // 计算当前双指距离
            const currentDistance = Math.sqrt(
              Math.pow(touch2.clientX - touch1.clientX, 2) +
                Math.pow(touch2.clientY - touch1.clientY, 2),
            );

            // 计算上一次双指距离
            const lastTouch1 = this.lastTouches[0];
            const lastTouch2 = this.lastTouches[1];
            const lastDistance = Math.sqrt(
              Math.pow(lastTouch2.clientX - lastTouch1.clientX, 2) +
                Math.pow(lastTouch2.clientY - lastTouch1.clientY, 2),
            );

            // 计算缩放比例
            if (lastDistance > 0) {
              const scaleChange = currentDistance / lastDistance;
              const newScale = this.scale * scaleChange;

              // 限制缩放范围
              if (newScale > 0.5 && newScale < 5) {
                this.scale = newScale;

                // 计算中心点以实现围绕中心缩放
                const centerX = (touch1.clientX + touch2.clientX) / 2;
                const centerY = (touch1.clientY + touch2.clientY) / 2;

                // 调整平移以实现围绕中心点缩放
                this.translateX =
                  centerX - (centerX - this.translateX) * scaleChange;
                this.translateY =
                  centerY - (centerY - this.translateY) * scaleChange;

                this.updateDisplay();
              }
            }

            this.lastTouches = Array.from(e.touches);
          }
        }

        // 触摸结束事件
        handleTouchEnd(e) {
          e.preventDefault();
          this.lastTouches = Array.from(e.touches);
        }

        // 滚轮事件（鼠标缩放）
        handleWheel(e) {
          e.preventDefault();

          // 获取鼠标在画布上的位置
          const rect = this.canvas.getBoundingClientRect();
          const mouseX = e.clientX - rect.left;
          const mouseY = e.clientY - rect.top;

          // 计算缩放比例
          const zoomIntensity = 0.1;
          const scaleChange =
            e.deltaY < 0 ? 1 + zoomIntensity : 1 - zoomIntensity;
          const newScale = this.scale * scaleChange;

          // 限制缩放范围
          if (newScale > 0.5 && newScale < 5) {
            this.scale = newScale;

            // 调整平移以实现围绕鼠标位置缩放
            this.translateX = mouseX - (mouseX - this.translateX) * scaleChange;
            this.translateY = mouseY - (mouseY - this.translateY) * scaleChange;

            this.updateDisplay();
          }
        }
      }

      class GeolocationService {
        constructor() {
          this.position = null;
        }

        getLocation() {
          return new Promise((resolve, reject) => {
            // 使用高德地图API获取位置
            AMap.plugin("AMap.Geolocation", () => {
              var geolocation = new AMap.Geolocation({
                enableHighAccuracy: true, // 是否使用高精度定位
                timeout: 10000, // 超过10秒后停止定位
                maximumAge: 0, // 定位结果缓存0毫秒
                convert: true, // 自动偏移坐标，偏移后的坐标为高德坐标
                showButton: true, // 显示定位按钮
                buttonPosition: "LB", // 定位按钮停靠位置
                buttonOffset: new AMap.Pixel(10, 20), // 定位按钮与设置的停靠位置的偏移量
                showMarker: false, // 定位成功后在定位到的位置显示点标记
                showCircle: false, // 定位成功后用圆圈表示定位精度范围
                panToLocation: false, // 定位成功后将定位到的位置作为地图中心点
                zoomToAccuracy: false, // 定位成功后调整地图视野范围使定位位置及精度范围视野内可见
              });

              geolocation.getCurrentPosition((status, result) => {
                if (status === "complete") {
                  this.parsePosition(result);
                  resolve(this.position);
                } else {
                  reject(result.message);
                }
              });
            });
          });
        }

        parsePosition(result) {
          // 解析高德地图返回的位置信息
          this.position = {
            latitude: result.position.lat,
            longitude: result.position.lng,
            accuracy: result.accuracy || 10,
            address: result.address, // 地址信息
            timestamp: new Date().toLocaleString(),
          };
        }

        getErrorDescription(error) {
          return error;
        }
      }

      // 获取DOM元素
      const canvas = document.getElementById("mapCanvas");
      const locateBtn = document.getElementById("locateBtn");
      const clearFogBtn = document.getElementById("clearFogBtn"); // 添加对清除迷雾按钮的引用
      const statusText = document.getElementById("statusText");
      const coordinatesDisplay = document.getElementById("coordinatesDisplay");

      // 创建战争迷雾地图实例
      let warFogMap = new WarFogMap("mapCanvas");
      let watchId = null;
      let geolocation = null; // 高德地图定位对象

      // 处理位置更新
      function handlePositionUpdate(position) {
        // 获取真实的GPS坐标
        const latitude = position.position.lat;
        const longitude = position.position.lng;
        const accuracy = position.accuracy || 10;

        // 将GPS坐标转换为画布坐标
        const canvasPos = warFogMap.gpsToCanvas(latitude, longitude);
        let newX = canvasPos.x;
        let newY = canvasPos.y;

        // 确保坐标在画布范围内
        newX = Math.min(canvas.width - 5, Math.max(5, newX));
        newY = Math.min(canvas.height - 5, Math.max(5, newY));

        // 设置新位置并更新显示
        warFogMap.setUserPosition(newX, newY);

        // 确保在设置新位置后更新显示
        warFogMap.updateDisplay();
        warFogMap.centerOnUser();

        statusText.textContent = `位置已更新 - 精度: ${Math.round(accuracy)} m - ${latitude.toFixed(6)}, ${longitude.toFixed(6)} `;

        // 添加位置信息打印到控制台
        console.log("位置更新:", {
          latitude: latitude.toFixed(6),
          longitude: longitude.toFixed(6),
          accuracy: Math.round(accuracy),
          canvasX: newX.toFixed(2),
          canvasY: newY.toFixed(2),
          timestamp: new Date().toLocaleTimeString(),
        });
      }

      // 获取用户位置
      function getUserLocation() {
        statusText.textContent = "正在获取位置...";

        // 直接启动持续定位监听，而不等待初始位置获取
        startContinuousLocationTracking();

        // 同时尝试获取当前位置用于快速定位
        const geolocationService = new GeolocationService();
        geolocationService
          .getLocation()
          .then((location) => {
            console.log("Initial location data:", location);
            statusText.textContent = "位置获取成功！持续跟踪已启动...";

            // 创建模拟位置对象以兼容现有代码
            const mockPosition = {
              position: {
                lat: location.latitude,
                lng: location.longitude,
              },
              accuracy: location.accuracy,
              timestamp: Date.now(),
            };

            handlePositionUpdate(mockPosition);
          })
          .catch((error) => {
            console.error("Initial location error:", error);
            statusText.textContent = `初始位置获取失败: ${error}。`;
          });
      }

      // 简化getUserLocationAndWatch函数，避免重复逻辑
      function startContinuousLocationTracking() {
        if (watchId === null) {
          statusText.textContent = "正在启动位置跟踪...";

          // 使用高德地图API进行持续定位
          AMap.plugin("AMap.Geolocation", () => {
            geolocation = new AMap.Geolocation({
              enableHighAccuracy: true,
              timeout: 10000,
              maximumAge: 2000, // 位置缓存时间2秒
              convert: true,
              showButton: false,
              showMarker: false,
              showCircle: false,
              panToLocation: false,
              zoomToAccuracy: false,
            });

            // 启动持续定位
            watchId = setInterval(() => {
              geolocation.getCurrentPosition((status, result) => {
                if (status === "complete") {
                  handlePositionUpdate(result);
                } else {
                  const geolocationService = new GeolocationService();
                  console.error("Watch position error:", result.message);
                  statusText.textContent = `定位错误: ${result.message}`;
                }
              });
            }, 2000); // 每2秒获取一次位置
          });
        }
      }

      // 停止位置监听
      function stopWatching() {
        if (watchId !== null) {
          clearInterval(watchId);
          watchId = null;
        }
      }

      // 重置地图
      function resetMap() {
        stopWatching();

        // 重新初始化迷雾
        warFogMap = new WarFogMap("mapCanvas");

        // 重绘界面
        warFogMap.updateDisplay();

        // 重新开始位置跟踪
        startContinuousLocationTracking();
      }

      // 添加处理hash变化的函数
      function handleHashChange() {
        const hash = window.location.hash.substring(1); // 移除#符号
        if (hash) {
          // 查找匹配的建筑
          const buildingIndex = Buildings.findIndex(
            (building) => building.id === hash,
          );
          if (buildingIndex !== -1) {
            // 更新建筑状态
            Buildings[buildingIndex].status = 1;
            // 保存到本地存储
            localStorage.setItem("buildings_status", JSON.stringify(Buildings));
            // 重新渲染底部面板
            setGrid(
              2,
              Math.round(Buildings.length / 2),
              rearrangeByIndexParity(Buildings),
            );
          }
        }
      }
      function updateMetaDescription(contentText, createIfMissing = true) {
        if (!contentText) return;

        const selector = 'meta[name="description"]';
        let metaTag = document.querySelector(selector);

        if (!metaTag) {
          if (createIfMissing) {
            metaTag = document.createElement("meta");
            metaTag.name = "description";
            metaTag.setAttribute("itemprop", "description");
            document.head.appendChild(metaTag);
          } else {
            console.warn("未找到 meta description 标签且未开启自动创建。");
            return;
          }
        }

        metaTag.setAttribute("content", contentText);
        return true;
      }
      // 初始化
      function init() {
        // 页面加载时检查当前hash
        // 从本地存储加载已保存的打卡状态
        const savedBuildings = localStorage.getItem("buildings_status");
        if (savedBuildings) {
          const parsedBuildings = JSON.parse(savedBuildings);
          // 更新Buildings数组中的status值
          for (let i = 0; i < parsedBuildings.length; i++) {
            if (Buildings[i] && parsedBuildings[i]) {
              Buildings[i].status = parsedBuildings[i].status;
            }
          }
        }
        checkIn(Buildings);
        // 添加hash变化监听
        window.addEventListener("hashchange", handleHashChange);

        setGrid(
          2,
          Math.round(Buildings.length / 2),
          rearrangeByIndexParity(Buildings),
        );
        handleHashChange();

        // 获取初始位置并启动持续跟踪
        // getUserLocation();
        startContinuousLocationTracking();
        // 将用户位置居中
        warFogMap.centerOnUser();
        updateMetaDescription(
          `我已在嘉兴南湖学院打卡了${Array.from(eval(localStorage.getItem("buildings_status"))).filter((item) => item.status === 1).length}处建筑`,
        );
      }

      // 页面加载完成后初始化
      window.onload = init;
      // 切换底部栏展开/收起状态
      function togglePanel() {
        const panel = document.getElementById('bottomPanel');
        const btn = document.getElementById('panelToggleBtn');
        panel.classList.toggle('expanded');
        
        // 根据面板状态切换按钮旋转角度
        if (panel.classList.contains('expanded')) {
          btn.style.transform = 'rotate(90deg)';
          btn.style.borderRadius = '8px 0 0 8px';
        } else {
          btn.style.transform = 'rotate(-90deg)';
          btn.style.borderRadius = '0 8px 8px 0';
        }
      }
    </script>
  </body>
</html>
